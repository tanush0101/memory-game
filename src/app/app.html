<div class="game-container">
  <div class="welcome-screen" *ngIf="!gameStarted">
    <h1 class="main-title">
      MEMORY GAME USING ANGULARJS <br />
      <p></p>
      <span class="subtitle">TANUSH AILANI CO6K-A 48</span>
    </h1>
    <div class="input-group">
      <input
        type="text"
        [(ngModel)]="playerName"
        placeholder="Enter Name"
        (keyup.enter)="startGame()"
      />
      <button (click)="startGame()">ENTER GAME</button>
    </div>
  </div>

  <div class="arena" *ngIf="gameStarted">
    <div class="sidebar" @slideIn>
      <div class="hud-panel">
        <h3>LEADERBOARD</h3>
        <ul class="leaderboard-list">
          <li *ngFor="let player of leaderboard; let i = index">
            <span class="rank">#{{ i + 1 }}</span>
            <span class="name">{{ player.name }}</span>
            <span class="score">{{ player.score }}</span>
          </li>
          <li *ngIf="leaderboard.length === 0" class="empty">No Records Yet</li>
        </ul>
      </div>

      <div class="hud-panel stats">
        <div class="stat-box">
          <label>PLAYER</label>
          <span class="value">{{ playerName }}</span>
        </div>
        <div class="stat-box timer-box">
          <label>TIMER</label>
          <span class="value" [class.urgent]="timeLeft < 20">{{ displayTime }}</span>

          <div class="progress-bar-bg">
            <div
              class="progress-bar-fill"
              [style.width.%]="(timeLeft / TOTAL_TIME) * 100"
              [class.warning]="timeLeft < 45"
              [class.danger]="timeLeft < 20"
            ></div>
          </div>
        </div>
      </div>

      <button class="quit-btn" (click)="restart()">QUIT GAME</button>
    </div>

    <div class="main-stage" @popIn>
      <div class="overlay" *ngIf="gameOver">
        <div class="modal">
          <h2 *ngIf="victory" class="win">GAME COMPLETED</h2>
          <h2 *ngIf="!victory" class="lose">GAME OVER</h2>
          <p>Final Score: {{ timeLeft * 10 }}</p>
          <div class="btn-row">
            <button (click)="startGame()">RETRY</button>
            <button (click)="restart()">EXIT</button>
          </div>
        </div>
      </div>

      <div class="card-grid">
        <div class="card-container" *ngFor="let card of cards" (click)="flipCard(card)">
          <div
            class="card"
            [@cardFlip]="
              card.matched
                ? 'matched'
                : card.mismatch
                  ? 'mismatch'
                  : card.flipped
                    ? 'flipped'
                    : 'default'
            "
          >
            <div class="face front">
              <i class="fa-solid fa-microchip"></i>
            </div>

            <div
              class="face back"
              [class.error-glow]="card.mismatch"
              [style.color]="card.mismatch ? 'red' : card.color"
              [style.border-color]="card.mismatch ? 'red' : card.color"
            >
              <i [class]="card.icon"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
